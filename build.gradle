plugins {
    id 'java'
    id 'application'
}

group = 'com.legacycraft'
version = '0.1-pre1'

// Toolchain pins the build to Java 8 regardless of which JVM Gradle itself
// runs on. Gradle auto-detects installed JDKs, so JAVA_HOME does not need
// to be set manually. JavaFX is bundled with Oracle JDK 8 / Zulu FX 8.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(8)
    }
}

repositories {
    mavenCentral()
}

application {
    mainClass = 'com.legacycraft.Main'
}

jar {
    manifest {
        attributes(
            'Implementation-Title'  : 'LegacyCraft DevKit',
            'Implementation-Version': project.version,
            'Main-Class'            : 'com.legacycraft.Main'
        )
    }
}
