plugins {
    id 'java'
    id 'application'
}

group = 'com.legacycraft'
version = '0.1-pre3'

// Toolchain pins the build to Java 8 regardless of which JVM Gradle itself
// runs on. A Zulu 8 FX install is required for JavaFX to be on the
// compile/runtime classpath.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(8)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // CFR: in-process Java decompiler. Java 6+ compatible.
    implementation 'org.benf:cfr:0.152'

    // Line-level diffs between current source and original baseline.
    implementation 'io.github.java-diff-utils:java-diff-utils:4.12'
}

application {
    mainClass = 'com.legacycraft.Main'
}

jar {
    archiveFileName = 'devkit_gui.jar'

    manifest {
        attributes(
            'Implementation-Title'  : 'LegacyCraft DevKit',
            'Implementation-Version': project.version,
            'Main-Class'            : 'com.legacycraft.Main'
        )
    }

    // Bundle dependencies into a fat jar so users only need devkit_gui.jar.
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'
    exclude 'META-INF/MANIFEST.MF'
}
